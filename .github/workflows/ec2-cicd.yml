name: CI CD To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          BRANCH: main
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: APP_DIR,REPO_URL,BRANCH,BACKEND_ENV,VITE_BASE_URL
          script_stop: true
          script: |
            set -e

            if [ -z "$APP_DIR" ]; then
              echo "EC2_APP_DIR secret is required"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            cd backend
            printf '%s\n' "$BACKEND_ENV" > .env
            npm ci --omit=dev

            if pm2 describe mealsphere-backend >/dev/null 2>&1; then
              pm2 restart mealsphere-backend --update-env
            else
              pm2 start index.js --name mealsphere-backend
            fi
            pm2 save

            cd ../frontend
            printf 'VITE_BASE_URL=%s\n' "$VITE_BASE_URL" > .env.production
            npm ci
            npm run build

            sudo mkdir -p /var/www/mealsphere
            sudo rsync -a --delete dist/ /var/www/mealsphere/
            sudo systemctl reload nginx
